<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Story Generator</title>
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(#0f0f1e, #1a0033); 
      color: #e0e0ff; 
      text-align: center; 
      padding: 20px;
    }
    h1 { color: #ff00aa; text-shadow: 0 0 10px #ff00aa; }
    button { 
      padding: 14px 24px; 
      margin: 10px; 
      background: #1a0033; 
      color: #00ffff; 
      border: 2px solid #ff00aa; 
      border-radius: 8px; 
      font-weight: bold;
    }
    .choice { color: #a0ffff; font-weight: bold; min-height: 28px; }
    #story { 
      margin-top: 30px; 
      padding: 25px; 
      background: rgba(0,0,0,0.7); 
      border: 3px solid #ff00aa; 
      border-radius: 12px; 
      min-height: 180px;
    }
  </style>
</head>
<body>
  <h1> PERSONA AWAKENING</h1>
  <p>Choose your fate... The Velvet Room awaits.</p>

  <h3>1. Your Persona User</h3>
  <button onclick="cycle(0)">Choose Persona</button>
  <p class="choice" id="choice0">---</p>

  <h3>2. Your Action</h3>
  <button onclick="cycle(1)">Choose Action</button>
  <p class="choice" id="choice1">---</p>

  <h3>3. The Shadow Realm</h3>
  <button onclick="cycle(2)">Choose Realm</button>
  <p class="choice" id="choice2">---</p>

  <h3>4. Your Weapon</h3>
  <button onclick="cycle(3)">Choose Weapon</button>
  <p class="choice" id="choice3">---</p>

  <h3>5. Final Arcana</h3>
  <button onclick="cycle(4)">Choose Arcana</button>
  <p class="choice" id="choice4">---</p>

  <br><br>
  <button onclick="showStory()" style="background:#ff00aa; color:white; padding:16px 32px; font-size:1.3rem;">
     AWAKEN YOUR STORY 
  </button>

  <div id="story"></div>

  <script>
    const options = [
      ["Ren Amamiya", "Makoto Niijima", "Ryuji Sakamoto", "Ann Takamaki", "Yusuke Kitagawa"],
      ["summoned their Persona", "struck down a powerful Shadow", "infiltrated the Palace", "made a pact with a demon", "awakened a new power"],
      ["the Metaverse Palace", "Mementos' depths", "the Velvet Room", "a distorted Tokyo", "the Cognitive World"],
      ["a katana that cuts through lies", "a revolver of rebellion", "a whip of passion", "a paintbrush of creation", "a mask of trickery"],
      ["The Fool", "The Magician", "The Priestess", "The Chariot", "The Lovers"]
    ];

    let selections = ["", "", "", "", ""];

    function cycle(index) {
      let current = options[index].indexOf(selections[index]);
      if (current === -1) current = 0;
      else current = (current + 1) % options[index].length;
      
      selections[index] = options[index][current];
      document.getElementById(`choice${index}`).textContent = selections[index];
    }

    function showStory() {
      if (selections.includes("")) {
        document.getElementById("story").innerHTML = "<p style='color:#ff00aa;'>You must choose all 5 fates before awakening...</p>";
        return;
      }

      const story = `
        In the shadows of Tokyo, <strong>${selections[0]}</strong> 
        <strong>${selections[1]}</strong> within 
        <strong>${selections[2]}</strong>. 
        Wielding <strong>${selections[3]}</strong>, 
        they embraced the power of <strong>${selections[4]}</strong> Arcana.
      `;

      document.getElementById("story").innerHTML = `<h2>Your Persona Story:</h2><p>${story}</p>`;
    }
  </script>
</body>
</html>
