<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Story Generator</title>
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(#0f0f1e, #1a0033); 
      color: #e0e0ff; 
      text-align: center; 
      padding: 20px;
    }
    h1 { color: #ff00aa; text-shadow: 0 0 10px #ff00aa; }
    button { 
      padding: 14px 24px; 
      margin: 10px; 
      background: #1a0033; 
      color: #00ffff; 
      border: 2px solid #ff00aa; 
      border-radius: 8px; 
      font-weight: bold;
    }
    .choice { color: #a0ffff; font-weight: bold; min-height: 28px; }
    #story { 
      margin-top: 30px; 
      padding: 25px; 
      background: rgba(0,0,0,0.7); 
      border: 3px solid #ff00aa; 
      border-radius: 12px; 
      min-height: 180px;
    }
  </style>
</head>
